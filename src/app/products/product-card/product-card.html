<section class="product-view">
  <header class="product-view__hero">
    <div>
      <p class="product-view__eyebrow">Category</p>
      <h1>{{category()}}</h1>
      <p class="product-view__subhead">Curated picks with clear specs and clean comparisons.</p>
    </div>
  </header>

  <div class="product-view__layout">

    <div class="product-view__grid">
      @for (product of products(); track product.id) {
        <a class="product-card__link" [routerLink]="['/products', category(), product.productId || product.id]">
          <article class="product-card">
            <div class="product-card__media">
              <img
                [ngSrc]="product.productImg"
                width="220"
                height="180"
                alt="{{ product.name }}"
              />
            </div>
            <div class="product-card__details">
              @switch (category())
              {
                @case (ProductTypes.CPU)
                {
                  <app-cpu-spec-details [product]="product"/>
                }
                @case (ProductTypes.GPU)
                {
                  <app-gpu-spec-details [product]="product"/>
                }
                @case (ProductTypes.COOLER)
                {
                  <app-cooler-spec-details [product]="product"/>
                }
              }
            </div>
          </article>
        </a>
      } @empty {
        <div class="product-view__empty">
          No products found for this category yet.
        </div>
      }
    </div>
  </div>
</section>
